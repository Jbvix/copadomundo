# Versão: 1.1.0

[build]
  base = ""
  publish = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/ia"
  to = "/.netlify/functions/gemini"
  status = 200

[[redirects]]
  from = "/api/wc"
  to = "/.netlify/functions/zafronix"
  status = 200

[[redirects]]
  from = "/api/games"
  to = "https://worldcup26.ir/get/games"
  status = 200
  force = true

[[redirects]]
  from = "/api/games-backup"
  to = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"
  status = 200
  force = true